<script>
const SUPABASE_URL = 'https://muvdkmfxytywsbzmjbbn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Des6mpIhcXQe5gLPwU0GoA_3CnYFfdc';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// 1. Agar user pehle se login hai to seedha dashboard bhejo
sb.auth.getSession().then(({ data }) => {
    if(data.session) window.location.href = 'dashboard.html';
});

let selectedPlan = 'pro';
function selectPlan(el, plan) {
    document.querySelectorAll('.plan-opt').forEach(o => o.classList.remove('sel'));
    el.classList.add('sel');
    selectedPlan = plan;
}

function togglePass(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if(val.length >= 8) score++;
    if(/[A-Z]/.test(val)) score++;
    if(/[0-9]/.test(val)) score++;
    if(/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#ef4444','#f59e0b','#22c55e','#22c55e'];
    const labels = ['Too weak','Fair','Strong','Very strong'];
    const widths = ['25%','50%','75%','100%'];
    if(val.length === 0) { fill.style.width='0%'; text.textContent=''; return; }
    fill.style.width = widths[score-1]||'25%';
    fill.style.background = colors[score-1]||'#ef4444';
    text.textContent = labels[score-1]||'Too weak';
    text.style.color = colors[score-1]||'#ef4444';
}

function showAlert(msg, type) {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = 'alert ' + type;
}

async function signup() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const company = document.getElementById('company').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signupBtn');

    if(!firstName || !lastName || !email || !company || !password) {
        showAlert('Please fill all required fields.', 'error');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Creating account...';

    // Signup Process
    const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: {
            data: {
                full_name: firstName + ' ' + lastName,
                company: company,
                plan: selectedPlan
            }
        }
    });

    if(error) {
        showAlert(error.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Create Free Account';
    } else {
        // AGAR EMAIL CONFIRMATION ON HAI:
        if (data.user && !data.session) {
            showAlert('✅ Signup Successful! Please check your email to confirm, then you can login.', 'success');
            // Option: Aap yahan redirect kar sakte hain login page par
            setTimeout(() => window.location.href = 'login.html', 3000);
        } 
        // AGAR EMAIL CONFIRMATION OFF HAI (DIRECT LOGIN):
        else {
            showAlert('✅ Account created! Redirecting to dashboard...', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1000);
        }
    }
}

async function signupGoogle() {
    await sb.auth.signInWithOAuth({ 
        provider: 'google', 
        options: { redirectTo: window.location.origin + '/dashboard.html' } 
    });
}

// PARTICLES (Animation)
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, pts = [];
function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
for(let i = 0; i < 60; i++) pts.push({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3, r: Math.random()*1.2+.4, a: Math.random()*.4+.1 });
function draw() {
    ctx.clearRect(0,0,W,H);
    pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(14,165,233,${p.a})`; ctx.fill(); });
    requestAnimationFrame(draw);
}
draw();
</script>
