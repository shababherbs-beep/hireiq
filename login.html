<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — HireIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#040d1a;--bg2:#071628;--accent:#0ea5e9;--accent2:#38bdf8;--text:#f0f6ff;--muted:#7aa0c0;--border:rgba(14,165,233,0.15);--card:rgba(7,22,40,0.9);--success:#22c55e;--danger:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.hero-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 30% 50%,rgba(14,165,233,0.08) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 20%,rgba(56,189,248,0.05) 0%,transparent 60%)}
.wrap{position:relative;z-index:1;width:100%;max-width:420px}
.logo-wrap{text-align:center;margin-bottom:2rem}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.logo-sub{font-size:.82rem;color:var(--muted);margin-top:.3rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;backdrop-filter:blur(12px)}
.card-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:.3rem}
.card-sub{font-size:.875rem;color:var(--muted);margin-bottom:1.75rem}
.form-group{margin-bottom:1rem}
.form-label{font-size:.82rem;font-weight:500;color:var(--muted);margin-bottom:.4rem;display:block}
.form-input{width:100%;padding:.8rem 1rem;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:'DM Sans',sans-serif}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.form-input.error{border-color:var(--danger)}
.password-wrap{position:relative}
.password-toggle{position:absolute;right:.875rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:.2rem}
.forgot-link{font-size:.8rem;color:var(--accent);text-decoration:none;float:right;margin-top:.35rem;transition:opacity .2s}
.forgot-link:hover{opacity:.8}
.submit-btn{width:100%;padding:.875rem;border-radius:8px;background:var(--accent);color:#fff;font-size:.95rem;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.submit-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:.875rem;margin:1.25rem 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:.78rem;color:var(--muted);white-space:nowrap}
.google-btn{width:100%;padding:.8rem;border-radius:8px;background:rgba(255,255,255,0.05);color:var(--text);font-size:.9rem;font-weight:500;border:1px solid var(--border);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:.6rem}
.google-btn:hover{border-color:var(--accent);background:rgba(14,165,233,0.05)}
.switch-link{text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--muted)}
.switch-link a{color:var(--accent);text-decoration:none;font-weight:600}
.switch-link a:hover{text-decoration:underline}
.alert{padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none;align-items:center;gap:.5rem}
.alert.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;display:flex}
.alert.success{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);color:#4ade80;display:flex}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.back-link{display:flex;align-items:center;gap:.4rem;color:var(--muted);text-decoration:none;font-size:.82rem;margin-bottom:1.25rem;transition:color .2s;width:fit-content}
.back-link:hover{color:var(--text)}
</style>
</head>
<body>
<div class="hero-bg"></div>
<canvas id="c"></canvas>

<div class="wrap">
  <a href="index.html" class="back-link">← Back to HireIQ</a>
  <div class="logo-wrap">
    <a href="index.html" class="logo">Hire<span>IQ</span></a>
    <div class="logo-sub">AI-Powered CV Screening</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back 👋</div>
    <div class="card-sub">Sign in to your HireIQ account</div>

    <div class="alert" id="alertBox"></div>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" class="form-input" id="email" placeholder="you@company.com" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
      <label class="form-label">Password <a href="forgot.html" class="forgot-link">Forgot password?</a></label>
      <div class="password-wrap">
        <input type="password" class="form-input" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter')login()">
        <button class="password-toggle" onclick="togglePass('password', this)" type="button">👁</button>
      </div>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="login()">
      Sign In
    </button>

    <div class="divider"><div class="divider-line"></div><div class="divider-text">or continue with</div><div class="divider-line"></div></div>

    <button class="google-btn" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="switch-link">
    Don't have an account? <a href="signup.html">Sign up free</a>
  </div>
</div>

<script>
// SUPABASE SETUP
const SUPABASE_URL = 'https://muvdkmfxytywsbzmjbbn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11dmRrbWZ4eXR5d3Niem1qYmJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDEzNjAsImV4cCI6MjA5MzQxNzM2MH0.BLUowstvk8rQKBj6-3GXbzCn2hNTW0q7smIQCPS1ZeA';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
sb.auth.getSession().then(({ data }) => {
  if(data.session) window.location.href = 'dashboard.html';
});

function showAlert(msg, type) {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = 'alert ' + type;
}

function togglePass(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if(!email || !email.includes('@')) { showAlert('Please enter a valid email address.', 'error'); return; }
  if(!password) { showAlert('Please enter your password.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if(error) {
    showAlert(error.message === 'Invalid login credentials' ? 'Wrong email or password. Please try again.' : error.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  } else {
    showAlert('✅ Signed in! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
  }
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
}

// PARTICLES
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, pts = [];
function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
for(let i = 0; i < 60; i++) pts.push({ x: Math.random()*1e4%W||W/2, y: Math.random()*1e4%H||H/2, vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3, r: Math.random()*1.2+.4, a: Math.random()*.4+.1 });
function draw() {
  ctx.clearRect(0,0,W,H);
  pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(14,165,233,${p.a})`; ctx.fill(); });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
