<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireIQ Dashboard - Screening</title>
    <style>
        /* Basic Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .wizard-card { display: none; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .active { display: block; }
        .proc-step { color: #ccc; margin: 10px 0; transition: 0.3s; }
        .proc-step.active { color: #2ecc71; font-weight: bold; }
        #progressBarContainer { width: 100%; background: #eee; border-radius: 10px; margin: 20px 0; }
        #progressBar { width: 0%; height: 10px; background: #3498db; border-radius: 10px; transition: 0.3s; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .candidate-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- Step 1-4 (Inputs) - Brief Representation -->
    <div id="step1" class="wizard-card active">
        <h2>Job Details</h2>
        <input type="text" id="jobTitle" placeholder="Job Title" style="width:100%; padding:10px; margin-bottom:10px;">
        <textarea id="jobDesc" placeholder="Job Description" style="width:100%; height:100px; padding:10px;"></textarea>
        <button onclick="goToStep(2)">Next</button>
    </div>

    <div id="step2" class="wizard-card">
        <h2>Upload Resumes</h2>
        <input type="file" id="resumeUpload" multiple onchange="handleFiles(this.files)">
        <button onclick="startScreening()">Start Screening 🚀</button>
    </div>

    <!-- Step 5 (Processing & Progress) -->
    <div id="step5" class="wizard-card">
        <h2>Screening in Progress...</h2>
        <div id="ps1" class="proc-step">Initializing Analysis...</div>
        <div id="ps2" class="proc-step">Uploading to Server...</div>
        <div id="ps3" class="proc-step">AI Analysis Running...</div>
        <div id="ps4" class="proc-step">Finalizing Results...</div>

        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>
        <p id="progressText">0% complete</p>
    </div>

    <!-- Results Section -->
    <div id="resultsSection" class="wizard-card">
        <h2>Screening Results</h2>
        <div id="candidatesList" class="results-grid"></div>
        <button onclick="location.reload()">Start New Batch</button>
    </div>

    <script>
        let uploadedFiles = [];

        function goToStep(step) {
            document.querySelectorAll('.wizard-card').forEach(c => c.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        function handleFiles(files) {
            uploadedFiles = Array.from(files);
            console.log("Files selected:", uploadedFiles);
        }

        function markStep(stepNum, status) {
            // Internal logic to track steps (can be expanded)
            console.log("Step " + stepNum + " is " + status);
        }

        async function startScreening() {
            // Switch to progress screen
            document.querySelectorAll('.wizard-card').forEach(c => c.classList.remove('active'));
            document.getElementById('step5').classList.add('active');
            
            const bar = document.getElementById('progressBar');
            const txt = document.getElementById('progressText');
            
            // Start fake animation for progress
            let prog = 0;
            const interval = setInterval(() => {
                prog += 2;
                if(prog > 90) prog = 90; // Hold at 90 until API returns
                bar.style.width = prog + '%';
                txt.textContent = Math.round(prog) + '% complete';
            }, 300);

            document.getElementById('ps1').className = 'proc-step active';

            // Build FormData for API
            const formData = new FormData();
            formData.append('job_description', 
                document.getElementById('jobTitle').value + '\n\n' + 
                document.getElementById('jobDesc').value
            );
            uploadedFiles.forEach(f => formData.append('files', f));

            try {
                document.getElementById('ps2').className = 'proc-step active';
                
                // Real API Call
                const response = await fetch('https://hireiq-production-fbaa.up.railway.app/screen', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('Backend error: ' + response.statusText);

                document.getElementById('ps3').className = 'proc-step active';
                const data = await response.json();
                
                // Finish progress
                clearInterval(interval);
                bar.style.width = '100%';
                txt.textContent = '100% complete';
                document.getElementById('ps4').className = 'proc-step active';
                
                setTimeout(() => showResults(data.results), 600);
                
            } catch(err) {
                clearInterval(interval);
                alert('Error connecting to backend: ' + err.message);
                goToStep(2); // Error hone par wapas upload par le jayein
            }
        }

        function showResults(apiResults) {
            document.querySelectorAll('.wizard-card').forEach(c => c.classList.remove('active'));
            document.getElementById('resultsSection').classList.add('active');

            const container = document.getElementById('candidatesList');
            container.innerHTML = '';

            const candidates = apiResults || [];

            if (candidates.length === 0) {
                container.innerHTML = '<p>No candidates found or analysis failed.</p>';
                return;
            }

            candidates.forEach(candidate => {
                const card = document.createElement('div');
                card.className = 'candidate-card';
                card.innerHTML = `
                    <h3>${candidate.name || 'Unknown Candidate'}</h3>
                    <p><strong>Score:</strong> ${candidate.score || 'N/A'}/100</p>
                    <p><strong>Summary:</strong> ${candidate.summary || 'No summary available.'}</p>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
